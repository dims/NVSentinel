version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]

  # Go modules
  - package-ecosystem: "gomod"
    directories:
      - "/api"
      - "/commons"
      - "/data-models"
      - "/event-exporter"
      - "/fault-quarantine"
      - "/fault-remediation"
      - "/health-events-analyzer"
      - "/health-monitors/csp-health-monitor"
      - "/health-monitors/kubernetes-object-monitor"
      - "/health-monitors/nic-health-monitor"
      - "/health-monitors/slurm-drain-monitor"
      - "/health-monitors/syslog-health-monitor"
      - "/janitor"
      - "/janitor-provider"
      - "/labeler"
      - "/metadata-collector"
      - "/node-drainer"
      - "/platform-connectors"
      - "/plugins/mock-slurm-operator"
      - "/plugins/slinky-drainer"
      - "/preflight"
      - "/preflight-checks/nccl-loopback"
      - "/store-client"
      - "/tests"
      - "/tests/scale-tests/cmd/fqm-scale-test"
      - "/tests/scale-tests/event-generator"
      - "/tilt/csp-api-mock"
      - "/tilt/event-exporter-mock"
      - "/tilt/simple-health-client"
    target-branch: "main"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      grpc-protobuf:
        patterns:
          - "google.golang.org/grpc*"
          - "google.golang.org/protobuf*"
          - "google.golang.org/genproto*"
      go-dependencies:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "google.golang.org/grpc*"
          - "google.golang.org/protobuf*"
          - "google.golang.org/genproto*"

  # Python packages
  - package-ecosystem: "pip"
    directories:
      - "/health-monitors/gpu-health-monitor"
      - "/log-collector"
      - "/preflight-checks/dcgm-diag"
      - "/preflight-checks/nccl-allreduce"
    target-branch: "main"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    groups:
      python-dependencies:
        patterns: ["*"]

  # Docker
  - package-ecosystem: "docker"
    directories:
      - "/gpu-reset"
      - "/health-monitors/gpu-health-monitor"
      - "/health-monitors/syslog-health-monitor"
      - "/log-collector"
      - "/metadata-collector"
      - "/preflight-checks/dcgm-diag"
      - "/preflight-checks/nccl-allreduce"
      - "/preflight-checks/nccl-loopback"
      - "/tests/scale-tests/event-generator"
      - "/tilt/csp-api-mock"
      - "/tilt/dcgm-fake"
      - "/tilt/event-exporter-mock"
      - "/tilt/simple-health-client"
    target-branch: "main"
    schedule:
      interval: "monthly"
    labels: ["dependencies"]
    groups:
      docker-dependencies:
        patterns: ["*"]
